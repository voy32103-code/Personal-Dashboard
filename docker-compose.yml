
services:
  db:
    image: postgres:16
    container_name: my_portfolio_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: PortfolioDb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7.2-alpine
    container_name: my_portfolio_redis
    ports:
      - "6379:6379"
    command: redis-server --save 20 1 --loglevel warning

  prometheus:
    # L-3: Pin version thay vì dùng latest — reproducible builds
    image: prom/prometheus:v2.51.2
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    # L-3: Pin version thay vì dùng latest — tránh breaking changes bất ngờ
    image: grafana/grafana:10.4.2
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus

volumes:
  pgdata: